<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - KauanSite</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <button class="theme-toggle" id="themeToggle">◐</button>

    <div class="container">
        <div class="card">
            <h1>Criar Conta</h1>
            
            <form id="cadastroForm">
                <div class="input-group">
                    <label for="usuario">Usuário</label>
                    <input type="text" id="usuario" placeholder="Escolha um usuário" required>
                </div>
                
                <div class="input-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
                </div>
                
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Crie uma senha" required minlength="6">
                    <span class="toggle-password" id="toggleSenha">Mostrar</span>
                </div>
                
                <div class="input-group">
                    <label for="repetirSenha">Repetir Senha</label>
                    <input type="password" id="repetirSenha" placeholder="Repita a senha" required>
                </div>
                
                <button type="submit">Cadastrar</button>
            </form>
            
            <p class="cadastro-link">
                Já tem conta? <a href="index.html">Faça login</a>
            </p>
        </div>
    </div>

    <script src="login3.js"></script>
</body>
</html>
